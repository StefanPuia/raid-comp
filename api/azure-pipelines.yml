pr: none

trigger:
  paths:
    include:
      - api

variables:
  isMain: ${{ eq(variables['Build.SourceBranch'], 'refs/heads/main') }}
  GRADLE_USER_HOME: $(Pipeline.Workspace)/.gradle
  gradleCacheVersion: v1
  dockerRegistryServiceConnection: azureContainerRegistry2-raidcomp
  dockerRegistry: stefanpuia.azurecr.io
  dockerImage: raidcomp
  dockerImageVersion: $(Build.BuildNumber)
  workingDirectory: $(Build.SourcesDirectory)/api
  dockerContainerNameDev: raidcomp-dev
  dockerContainerPortDev: 10030
  dockerContainerNameProd: raidcomp-prod
  dockerContainerPortProd: 10031

