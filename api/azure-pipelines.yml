  - stage: buildAndPackage
    displayName: Build and Package
    jobs:
      - job: build
        displayName: Build
        pool: self-hosted-scale-set-02
        variables:
          - group: build
        steps:
          - task: Docker@2
            displayName: Build docker image
            inputs:
              command: build
              Dockerfile: $(workingDirectory)/Dockerfile
              buildContext: $(workingDirectory)
              repository: $(dockerRegistry)/$(dockerImage)
              tags: $(dockerImageVersion)

          - task: Docker@2
            displayName: Login to ACR
            inputs:
              command: login
              containerRegistry: $(dockerRegistryServiceConnection)

          - task: Docker@2
            displayName: Push image
            inputs:
              command: push
              containerRegistry: $(dockerRegistryServiceConnection)
              repository: $(dockerImage)
              tags: $(dockerImageVersion)

          - task: Docker@2
            displayName: Docker Logout
            inputs:
              command: logout
              containerRegistry: $(dockerRegistryServiceConnection)
        condition: always()

  - ${{ if eq(variables.isMain, true) }}:
      - template: api/azure/deploy-environment.yml
        parameters:
          environment: dev
          containerName: raidcomp-dev
          containerPort: 10030

      - template: api/azure/deploy-environment.yml
        parameters:
          environment: prod
          containerName: raidcomp-prod
          containerPort: 10031
